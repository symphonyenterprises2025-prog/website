<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Symphony Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-gift"></i> Symphony Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="products.html" class="nav-link"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="content.html" class="nav-link"><i class="fas fa-file-alt"></i> Content</a></li>
                    <li><a href="blog.html" class="nav-link"><i class="fas fa-blog"></i> Blog</a></li>
                    <li><a href="banners.html" class="nav-link"><i class="fas fa-image"></i> Banners</a></li>
                    <li><a href="testimonials.html" class="nav-link"><i class="fas fa-quote-left"></i> Testimonials</a></li>
                    <li><a href="analytics.html" class="nav-link active"><i class="fas fa-chart-bar"></i> Analytics</a></li>
                    <li><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h1>Analytics</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">Admin</span>
                        <img src="https://via.placeholder.com/40x40/8B4789/FFFFFF?text=A" alt="Admin" class="user-avatar">
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h2>Sales Analytics</h2>
                </div>

                <div class="period-filters">
                    <button class="btn btn-sm" data-period="7days">Last 7 Days</button>
                    <button class="btn btn-sm active" data-period="30days">Last 30 Days</button>
                    <button class="btn btn-sm" data-period="90days">Last 90 Days</button>
                    <button class="btn btn-sm" data-period="1year">Last Year</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3 id="totalRevenue">Rs 0</h3>
                            <p>Total Revenue</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3 id="totalOrders">0</h3>
                            <p>Total Orders</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3 id="averageOrderValue">Rs 0</h3>
                            <p>Average Order Value</p>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>Top Products</h3>
                        <div id="topProducts"></div>
                    </div>
                    <div class="dashboard-card">
                        <h3>Recent Orders</h3>
                        <div id="recentOrdersAnalytics"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
