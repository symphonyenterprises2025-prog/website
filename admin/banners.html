<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Management - Symphony Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-gift"></i> Symphony Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="products.html" class="nav-link"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="content.html" class="nav-link"><i class="fas fa-file-alt"></i> Content</a></li>
                    <li><a href="blog.html" class="nav-link"><i class="fas fa-blog"></i> Blog</a></li>
                    <li><a href="banners.html" class="nav-link active"><i class="fas fa-image"></i> Banners</a></li>
                    <li><a href="testimonials.html" class="nav-link"><i class="fas fa-quote-left"></i> Testimonials</a></li>
                    <li><a href="analytics.html" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a></li>
                    <li><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Banner Management</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">Admin</span>
                        <img src="https://via.placeholder.com/40x40/8B4789/FFFFFF?text=A" alt="Admin" class="user-avatar">
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h2>Banner Management</h2>
                    <button id="addBannerBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Banner
                    </button>
                </div>

                <div class="banner-grid"></div>
                <div class="pagination" id="bannerPagination"></div>
            </div>
        </main>
    </div>

    <div id="bannerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="bannerModalTitle">Add Banner</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bannerForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="bannerTitle">Title *</label>
                            <input type="text" id="bannerTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="bannerType">Banner Type *</label>
                            <select id="bannerType" required>
                                <option value="hero">Hero</option>
                                <option value="promotion">Promotion</option>
                                <option value="announcement">Announcement</option>
                                <option value="seasonal">Seasonal</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="bannerLink">Link URL</label>
                            <input type="url" id="bannerLink" placeholder="https://example.com">
                        </div>
                        <div class="form-group full-width">
                            <label for="bannerDescription">Description</label>
                            <textarea id="bannerDescription" rows="4" placeholder="Banner description"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="bannerStatus">Status</label>
                            <select id="bannerStatus">
                                <option value="Published">Published</option>
                                <option value="Draft">Draft</option>
                                <option value="Archived">Archived</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Banner</button>
                        <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/banners.js"></script>
</body>
</html>
