<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials - Symphony Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-gift"></i> Symphony Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="products.html" class="nav-link"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                    <li><a href="content.html" class="nav-link"><i class="fas fa-file-alt"></i> Content</a></li>
                    <li><a href="blog.html" class="nav-link"><i class="fas fa-blog"></i> Blog</a></li>
                    <li><a href="banners.html" class="nav-link"><i class="fas fa-image"></i> Banners</a></li>
                    <li><a href="testimonials.html" class="nav-link active"><i class="fas fa-quote-left"></i> Testimonials</a></li>
                    <li><a href="analytics.html" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a></li>
                    <li><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h1>Testimonials</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">Admin</span>
                        <img src="https://via.placeholder.com/40x40/8B4789/FFFFFF?text=A" alt="Admin" class="user-avatar">
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h2>Testimonials Management</h2>
                    <button id="addTestimonialBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Testimonial
                    </button>
                </div>

                <div id="testimonialsList"></div>
                <div class="pagination" id="testimonialsPagination"></div>
            </div>
        </main>
    </div>

    <div id="testimonialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="testimonialModalTitle">Add Testimonial</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="testimonialForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="testimonialTitle">Title *</label>
                            <input id="testimonialTitle" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="testimonialContent">Content *</label>
                            <textarea id="testimonialContent" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="testimonialCustomerName">Customer Name *</label>
                            <input id="testimonialCustomerName" required>
                        </div>
                        <div class="form-group">
                            <label for="testimonialCustomerRating">Rating (1-5)</label>
                            <input id="testimonialCustomerRating" type="number" min="1" max="5" value="5">
                        </div>
                        <div class="form-group">
                            <label for="testimonialCustomerLocation">Location</label>
                            <input id="testimonialCustomerLocation">
                        </div>
                        <div class="form-group">
                            <label for="testimonialStatus">Status</label>
                            <select id="testimonialStatus">
                                <option value="Published">Published</option>
                                <option value="Draft">Draft</option>
                                <option value="Archived">Archived</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Testimonial</button>
                        <button type="button" class="btn btn-secondary modal-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/testimonials.js"></script>
</body>
</html>
